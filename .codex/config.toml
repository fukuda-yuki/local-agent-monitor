# <repository>/.codex/config.toml
# trusted repository only

# 継続的な自律実装
approval_policy = "never"
sandbox_mode = "danger-full-access"

[agents]
# root orchestrator から直接生成される worker/reviewer のみ許可
max_depth = 1

# 通常の spawn_agent には適用されない。
# spawn_agents_on_csv を使用する場合だけ残す。
# job_max_runtime_seconds = 3600

[features.multi_agent_v2]
enabled = true

# root orchestrator を含む総スロット数。
# 8なら root 1 + subagent 最大7。
max_concurrent_threads_per_session = 8

# spawn_agent に model / reasoning_effort を露出させる
hide_spawn_agent_metadata = false

# collaboration.spawn_agent の予約済みスキーマ衝突を回避
tool_namespace = "agents"