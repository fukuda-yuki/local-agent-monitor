# <repository>/.codex/config.toml
# trusted repository only

# 継続的な自律実装
approval_policy = "never"
sandbox_mode = "danger-full-access"

[agents]
max_depth = 2

[features.multi_agent_v2]
enabled = true

# root orchestrator を含む総スロット数。
max_concurrent_threads_per_session = 24

# spawn_agent に model / reasoning_effort を露出させる
hide_spawn_agent_metadata = false

# collaboration.spawn_agent の予約済みスキーマ衝突を回避
tool_namespace = "agents"


enabled-reasoning-efforts = ["medium", "xhigh"]
model_verbosity = "low"
model_reasoning_summary = "concise"

notify = ["turn-ended"]

[plugins. "computer-use@openai-bundled"]
enabled = true

[plugins. "browser@openai-bundled"]
enabled = true