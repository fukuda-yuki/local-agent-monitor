services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      LANGFUSE_OTLP_ENDPOINT: ${LANGFUSE_OTLP_ENDPOINT:-http://host.docker.internal:3000/api/public/otel}
      LANGFUSE_AUTH: ${LANGFUSE_AUTH:?Set LANGFUSE_AUTH to Base64(public-key:secret-key)}
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - ./otel-collector.example.yaml:/etc/otelcol/config.yaml:ro
