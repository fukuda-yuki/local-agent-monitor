name: Temporary final skills verification

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: codex/skills-cleanup-20260719
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Verify repository skill inventory
        shell: bash
        run: |
          set -euo pipefail

          test ! -e .codex/skills
          test ! -e .agents/skills/codex-create-pr
          test ! -e .agents/skills/semantic-generation
          test ! -e .agents/skills/aspire
          test ! -e .agents/skills/aspire-orchestration
          test ! -e .agents/skills/aspire-monitoring

          mapfile -t agent_skills < <(find .agents/skills -mindepth 2 -maxdepth 2 -name SKILL.md -printf '%h\n' | sed 's#^.agents/skills/##' | sort)
          expected_agent_skills=(aspire-local-ops commit seed-demo spec-update sprint-evidence validate)
          diff -u <(printf '%s\n' "${expected_agent_skills[@]}") <(printf '%s\n' "${agent_skills[@]}")

          mapfile -t claude_skills < <(find .claude/skills -mindepth 2 -maxdepth 2 -name SKILL.md -printf '%h\n' | sed 's#^.claude/skills/##' | sort)
          expected_claude_skills=(commit seed-demo spec-update sprint-evidence validate)
          diff -u <(printf '%s\n' "${expected_claude_skills[@]}") <(printf '%s\n' "${claude_skills[@]}")

          for skill in aspire-local-ops commit seed-demo sprint-evidence; do
            grep -Fxq '  allow_implicit_invocation: false' ".agents/skills/${skill}/agents/openai.yaml"
          done

          for skill_file in .agents/skills/*/SKILL.md; do
            test "$(head -n 1 "$skill_file")" = '---'
          done

          grep -Fq '## Repository Skills' AGENTS.md
          grep -Fq 'Implicit invocation is limited to `spec-update` and `validate`.' AGENTS.md
          grep -Fq 'Keep `.claude/skills/` for Claude Code compatibility' AGENTS.md
          ! grep -Fq '.agents/skills/codex-subagent-dispatch/SKILL.md' AGENTS.md

          git diff --check origin/main...HEAD

      - name: Build solution
        shell: pwsh
        run: dotnet build CopilotAgentObservability.slnx

      - name: Install Playwright Chromium
        shell: pwsh
        run: pwsh scripts/test/install-playwright-chromium.ps1 -WithDeps

      - name: Run solution tests
        shell: pwsh
        run: dotnet test CopilotAgentObservability.slnx
