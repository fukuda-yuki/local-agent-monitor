name: Temporary repository skill cleanup

on:
  push:
    branches:
      - codex/skills-cleanup-20260719
    paths:
      - .github/workflows/skills-cleanup-temporary.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: codex/skills-cleanup-20260719
          fetch-depth: 0

      - name: Apply repository skill cleanup
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .codex/skills
          rm -rf \
            .agents/skills/aspire \
            .agents/skills/aspire-orchestration \
            .agents/skills/aspire-monitoring \
            .agents/skills/codex-create-pr \
            .agents/skills/semantic-generation

          mkdir -p .agents/skills/aspire-local-ops/agents
          cat > .agents/skills/aspire-local-ops/SKILL.md <<'EOF'
          ---
          name: aspire-local-ops
          description: Operate this repository's existing Aspire AppHost for local lifecycle and diagnostics. Use only when asked to start, stop, or inspect Aspire, or when diagnosing locks, ports, logs, traces, or resource state caused by a running AppHost. Do not use for ordinary build/test work, adding Aspire resources or integrations, deployment, or AppHost behavior changes without a specification update.
          license: MIT
          ---

          # Aspire Local Operations

          This repository contains an intentionally empty Aspire AppHost. Use it only as an existing local operations surface; do not infer or add resources, ServiceDefaults, integrations, deployment targets, or monitoring configuration.

          ## Scope guard

          - Read `docs/specifications/layers/telemetry-ingestion.md` and `docs/architecture.md` before making an Aspire usage decision.
          - Adding resources, integrations, deployment behavior, or public configuration is a product change: update the current specification and obtain the required user approval first.
          - Do not use this skill for the pinned repository build or test suite. Use `validate` instead.

          ## Local lifecycle

          Run commands from the repository root.

          1. Start the AppHost with `aspire start --non-interactive`. In a git worktree or whenever shared local state could collide, add `--isolated`.
          2. Inspect state with `aspire describe --format Json`. Add `--include-hidden` only when an expected proxy or helper resource is missing from the normal view.
          3. Use `aspire logs <resource>`, `aspire otel logs <resource>`, and `aspire otel traces <resource>` only after the resource exists in `aspire describe` output.
          4. Use `aspire stop` when cleanup is requested or when the running AppHost holds file or port locks.

          ## Safety rules

          - Do not run the AppHost with `dotnet run`; use the Aspire CLI.
          - Do not guess resource names, ports, endpoints, or AppHost APIs. Obtain them from `aspire describe` or current documentation.
          - If a build reports locked files or a port conflict, stop Aspire before treating it as a code failure.
          - Do not save, commit, paste, or share Aspire exports, dashboard tokens, captured prompts/responses, tool arguments/results, or other sensitive telemetry.
          - Do not install the obsolete Aspire workload or add dependencies unless the current specifications require it and the user approves it.

          ## Completion report

          State which Aspire commands ran, which resources were observed, whether the AppHost remains running, and any unverified scope. Aspire diagnostics do not replace the repository's pinned `validate` suite.
          EOF

          cat > .agents/skills/aspire-local-ops/agents/openai.yaml <<'EOF'
          interface:
            display_name: Aspire local operations
            short_description: Start, stop, and inspect the existing local AppHost.
          policy:
            allow_implicit_invocation: false
          EOF

          for skill in commit seed-demo sprint-evidence; do
            mkdir -p ".agents/skills/${skill}/agents"
            cat > ".agents/skills/${skill}/agents/openai.yaml" <<'EOF'
          policy:
            allow_implicit_invocation: false
          EOF
          done

          python3 - <<'PY'
          from pathlib import Path

          path = Path("AGENTS.md")
          text = path.read_text(encoding="utf-8")
          marker = "## Subagent Requests\n"
          section = """## Repository Skills

          - Keep repository-scoped skills under `.agents/skills/`.
          - Keep `.claude/skills/` for Claude Code compatibility; when a shared skill exists in both locations, update both copies together.
          - Repository skills must encode repository-specific workflows or safety boundaries. Do not vendor general .NET, MSBuild, test, coverage, or migration skill catalogs under `.codex/skills/`; install them at user scope only for the task that needs them.
          - Implicit invocation is limited to `spec-update` and `validate`. Every other `.agents/skills/*` skill must set `policy.allow_implicit_invocation: false` in `agents/openai.yaml`.
          - Keep Aspire operations in the single `aspire-local-ops` skill while the AppHost has no resources. Do not recreate router/orchestration/monitoring variants.

          """
          if "## Repository Skills\n" not in text:
              if marker not in text:
                  raise SystemExit("AGENTS.md insertion marker not found")
              text = text.replace(marker, section + marker, 1)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Verify skill inventory
        shell: bash
        run: |
          set -euo pipefail

          test ! -e .codex/skills
          test ! -e .agents/skills/codex-create-pr
          test ! -e .agents/skills/semantic-generation
          test ! -e .agents/skills/aspire
          test ! -e .agents/skills/aspire-orchestration
          test ! -e .agents/skills/aspire-monitoring

          mapfile -t agent_skills < <(find .agents/skills -mindepth 2 -maxdepth 2 -name SKILL.md -printf '%h\n' | sed 's#^.agents/skills/##' | sort)
          expected_agent_skills=(aspire-local-ops commit seed-demo spec-update sprint-evidence validate)
          diff -u <(printf '%s\n' "${expected_agent_skills[@]}") <(printf '%s\n' "${agent_skills[@]}")

          mapfile -t claude_skills < <(find .claude/skills -mindepth 2 -maxdepth 2 -name SKILL.md -printf '%h\n' | sed 's#^.claude/skills/##' | sort)
          expected_claude_skills=(commit seed-demo spec-update sprint-evidence validate)
          diff -u <(printf '%s\n' "${expected_claude_skills[@]}") <(printf '%s\n' "${claude_skills[@]}")

          for skill in aspire-local-ops commit seed-demo sprint-evidence; do
            grep -Fxq '    allow_implicit_invocation: false' ".agents/skills/${skill}/agents/openai.yaml"
          done

          for skill_file in .agents/skills/*/SKILL.md; do
            test "$(head -n 1 "$skill_file")" = '---'
          done

          grep -Fq '## Repository Skills' AGENTS.md
          git diff --check

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit \
            -m "Agent workflow: chore(skills): reduce repository skill surface" \
            -m "The repository carried broad .NET, MSBuild, test, migration, and overlapping Aspire skill catalogs that competed with its repository-specific guidance and could drift from upstream. Keep only the local workflows and safety boundaries that Codex needs here, preserve the Claude skill surface, and make low-frequency operations explicit-only."
          git push origin HEAD:codex/skills-cleanup-20260719
