name: Weekly Gitleaks Secret Scan

on:
  schedule:
    # 09:00 JST every Monday.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-gitleaks-secret-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan git history
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail

          archive="${RUNNER_TEMP}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          install_dir="${RUNNER_TEMP}/gitleaks-bin"
          download_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"

          curl -fsSL "${download_url}" -o "${archive}"
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${archive}" | sha256sum -c -

          mkdir -p "${install_dir}"
          tar -xzf "${archive}" -C "${install_dir}" gitleaks
          chmod +x "${install_dir}/gitleaks"
          "${install_dir}/gitleaks" version
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run gitleaks scan
        id: gitleaks
        shell: bash
        run: |
          set -euo pipefail

          report_path="${RUNNER_TEMP}/gitleaks-report.json"
          echo "report_path=${report_path}" >> "${GITHUB_OUTPUT}"

          set +e
          gitleaks git --redact=100 --report-format=json --report-path "${report_path}" --exit-code 2 .
          status=$?
          set -e

          if [ "${status}" -eq 0 ]; then
            echo "findings=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${status}" -eq 2 ]; then
            echo "findings=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "gitleaks scan failed with exit code ${status}" >&2
          exit "${status}"

      - name: Create issue for findings
        if: steps.gitleaks.outputs.findings == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT_PATH: ${{ steps.gitleaks.outputs.report_path }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          issue_body="${RUNNER_TEMP}/gitleaks-issue.md"
          scan_date_jst="$(TZ=Asia/Tokyo date +%F)"
          scan_time_jst="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S %Z')"
          title="[secret-scan] Gitleaks findings ${scan_date_jst}"

          python3 - "${REPORT_PATH}" "${issue_body}" "${scan_time_jst}" "${RUN_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_SERVER_URL}" <<'PY'
          import json
          import sys

          report_path, issue_body, scan_time_jst, run_url, repository, server_url = sys.argv[1:]

          def cell(value):
              text = "" if value is None else str(value)
              return text.replace("|", "\\|").replace("\r", " ").replace("\n", " ")

          with open(report_path, "r", encoding="utf-8") as handle:
              findings = json.load(handle)

          if not isinstance(findings, list):
              raise SystemExit("gitleaks report was not a JSON array")

          max_rows = 100
          rows = []
          for finding in findings[:max_rows]:
              rule_id = cell(finding.get("RuleID"))
              file_path = cell(finding.get("File"))
              line = cell(finding.get("StartLine") or finding.get("Line"))
              commit = str(finding.get("Commit") or "")
              if commit:
                  commit_cell = f"[{commit[:12]}]({server_url}/{repository}/commit/{commit})"
              else:
                  commit_cell = ""
              fingerprint = cell(finding.get("Fingerprint"))
              rows.append(f"| {rule_id} | {file_path} | {line} | {commit_cell} | {fingerprint} |")

          omitted = len(findings) - len(rows)

          body = [
              "# Gitleaks findings",
              "",
              f"- Scan date/time: {scan_time_jst}",
              f"- Repository: `{repository}`",
              f"- Workflow run: {run_url}",
              f"- Total findings: {len(findings)}",
              "",
              "Secret values, match strings, surrounding context, and the full redacted report are intentionally omitted from this issue.",
              "",
              "| RuleID | File | Line | Commit | Fingerprint |",
              "| --- | --- | ---: | --- | --- |",
              *rows,
          ]

          if omitted > 0:
              body.extend(["", f"Only the first {max_rows} findings are shown. {omitted} additional findings were omitted to keep the issue body bounded."])

          with open(issue_body, "w", encoding="utf-8", newline="\n") as handle:
              handle.write("\n".join(body) + "\n")
          PY

          gh issue create --repo "${GITHUB_REPOSITORY}" --title "${title}" --body-file "${issue_body}" --label security
