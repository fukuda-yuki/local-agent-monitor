name: Temporary remaining skills cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: codex/remaining-skills-cleanup-20260719
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Apply remaining repository skill cleanup
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .codex/skills
          rm -rf .agents/skills/semantic-generation

          for skill in commit seed-demo sprint-evidence; do
            mkdir -p ".agents/skills/${skill}/agents"
            cat > ".agents/skills/${skill}/agents/openai.yaml" <<'EOF'
          policy:
            allow_implicit_invocation: false
          EOF
          done

          mkdir -p scripts/agent
          cat > scripts/agent/sync-claude-skills.ps1 <<'EOF'
          [CmdletBinding()]
          param(
              [switch]$Check
          )

          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $repositoryRoot = (Resolve-Path -LiteralPath (Join-Path $PSScriptRoot '..\..')).Path
          $agentSkillsRoot = Join-Path $repositoryRoot '.agents\skills'
          $claudeSkillsRoot = Join-Path $repositoryRoot '.claude\skills'
          $sharedSkills = @(
              'aspire-local-ops'
              'commit'
              'seed-demo'
              'spec-update'
              'sprint-evidence'
              'validate'
          )

          function Get-MirroredFiles {
              param(
                  [Parameter(Mandatory)]
                  [string]$Root,

                  [switch]$ExcludeOpenAiMetadata
              )

              if (-not (Test-Path -LiteralPath $Root -PathType Container)) {
                  return @{}
              }

              $files = @{}
              foreach ($file in Get-ChildItem -LiteralPath $Root -File -Recurse -Force) {
                  $relativePath = [System.IO.Path]::GetRelativePath($Root, $file.FullName)
                  $relativePath = $relativePath.Replace('\', '/')

                  if ($ExcludeOpenAiMetadata -and ($relativePath -eq 'agents/openai.yaml' -or $relativePath.StartsWith('agents/'))) {
                      continue
                  }

                  $files[$relativePath] = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash
              }

              return $files
          }

          function Compare-Mirror {
              param(
                  [Parameter(Mandatory)]
                  [string]$SkillName
              )

              $sourceRoot = Join-Path $agentSkillsRoot $SkillName
              $destinationRoot = Join-Path $claudeSkillsRoot $SkillName

              if (-not (Test-Path -LiteralPath $sourceRoot -PathType Container)) {
                  throw "Canonical skill '$SkillName' is missing at '$sourceRoot'."
              }

              $sourceFiles = Get-MirroredFiles -Root $sourceRoot -ExcludeOpenAiMetadata
              $destinationFiles = Get-MirroredFiles -Root $destinationRoot
              $differences = [System.Collections.Generic.List[string]]::new()

              foreach ($relativePath in ($sourceFiles.Keys | Sort-Object)) {
                  if (-not $destinationFiles.ContainsKey($relativePath)) {
                      $differences.Add("missing destination file: $SkillName/$relativePath")
                      continue
                  }

                  if ($sourceFiles[$relativePath] -ne $destinationFiles[$relativePath]) {
                      $differences.Add("content differs: $SkillName/$relativePath")
                  }
              }

              foreach ($relativePath in ($destinationFiles.Keys | Sort-Object)) {
                  if (-not $sourceFiles.ContainsKey($relativePath)) {
                      $differences.Add("unexpected destination file: $SkillName/$relativePath")
                  }
              }

              return $differences
          }

          if ($Check) {
              $allDifferences = [System.Collections.Generic.List[string]]::new()
              foreach ($skillName in $sharedSkills) {
                  foreach ($difference in Compare-Mirror -SkillName $skillName) {
                      $allDifferences.Add($difference)
                  }
              }

              if ($allDifferences.Count -gt 0) {
                  $message = "Claude skill mirror is out of date:`n- " + ($allDifferences -join "`n- ") +
                      "`nRun: pwsh scripts/agent/sync-claude-skills.ps1"
                  throw $message
              }

              Write-Output "Claude skill mirror is up to date ($($sharedSkills.Count) shared skills)."
              exit 0
          }

          New-Item -ItemType Directory -Path $claudeSkillsRoot -Force | Out-Null

          foreach ($skillName in $sharedSkills) {
              $sourceRoot = Join-Path $agentSkillsRoot $skillName
              $destinationRoot = Join-Path $claudeSkillsRoot $skillName

              if (-not (Test-Path -LiteralPath $sourceRoot -PathType Container)) {
                  throw "Canonical skill '$skillName' is missing at '$sourceRoot'."
              }

              if (Test-Path -LiteralPath $destinationRoot) {
                  Remove-Item -LiteralPath $destinationRoot -Recurse -Force
              }
              New-Item -ItemType Directory -Path $destinationRoot -Force | Out-Null

              foreach ($file in Get-ChildItem -LiteralPath $sourceRoot -File -Recurse -Force) {
                  $relativePath = [System.IO.Path]::GetRelativePath($sourceRoot, $file.FullName)
                  $normalizedPath = $relativePath.Replace('\', '/')
                  if ($normalizedPath -eq 'agents/openai.yaml' -or $normalizedPath.StartsWith('agents/')) {
                      continue
                  }

                  $destinationPath = Join-Path $destinationRoot $relativePath
                  $destinationDirectory = Split-Path -Parent $destinationPath
                  New-Item -ItemType Directory -Path $destinationDirectory -Force | Out-Null
                  Copy-Item -LiteralPath $file.FullName -Destination $destinationPath -Force
              }
          }

          $remainingDifferences = [System.Collections.Generic.List[string]]::new()
          foreach ($skillName in $sharedSkills) {
              foreach ($difference in Compare-Mirror -SkillName $skillName) {
                  $remainingDifferences.Add($difference)
              }
          }

          if ($remainingDifferences.Count -gt 0) {
              throw "Claude skill synchronization failed:`n- $($remainingDifferences -join "`n- ")"
          }

          Write-Output "Synchronized $($sharedSkills.Count) shared skills from .agents/skills to .claude/skills."
          EOF

          cat > .agents/skills/validate/SKILL.md <<'EOF'
          ---
          name: validate
          description: Run the pinned repository validation suite (Claude skill mirror check, solution build, Playwright Chromium install, solution tests, optional collector config check) and report results in the required format
          ---

          # Repository Validation Suite

          Run the pinned validation commands from the repository root, in order.
          These are the commands defined in `AGENTS.md`; do not substitute different
          commands when one fails — report the failure instead.

          ## Commands

          1. `pwsh scripts\agent\sync-claude-skills.ps1 -Check`
             - Verifies that shared `.claude/skills/` copies exactly match their
               canonical `.agents/skills/` sources, excluding Codex-only
               `agents/openai.yaml` metadata.
             - To repair drift, run `pwsh scripts\agent\sync-claude-skills.ps1`, review
               the generated diff, and rerun this validation from the beginning.
          2. `dotnet build CopilotAgentObservability.slnx`
          3. `pwsh scripts\test\install-playwright-chromium.ps1`
             - Required because the solution test suite contains LocalMonitor
               Playwright browser smoke tests. The wrapper sets
               `PLAYWRIGHT_BROWSERS_PATH` to `artifacts\playwright-browsers` when unset.
             - On Linux CI, pass `-WithDeps`.
          4. `dotnet test CopilotAgentObservability.slnx`
          5. Only when files under `infra\otel-collector\` changed:

             ```powershell
             $env:LANGFUSE_AUTH="dummy"
             docker compose -f infra\otel-collector\docker-compose.example.yml config
             ```

          Targeted test while iterating (NOT a substitute for the full suite):

          ```powershell
          dotnet test tests\CopilotAgentObservability.ConfigCli.Tests\CopilotAgentObservability.ConfigCli.Tests.csproj --filter FullyQualifiedName~<test-or-class>
          ```

          ## Failure policy

          - If a command fails, is skipped, or cannot run because a tool is missing,
            stop and report the blocker. Do not treat a different command as an
            equivalent success.
          - Diagnostic commands may be useful follow-up evidence, but they do not
            replace the required validation.

          ## Report format

          Always end with:

          - Commands run and their results (including pass/fail test counts).
          - Unverified scope.
          - Exact commands still needed, if any.
          EOF

          mkdir -p .claude/skills
          cat > .claude/skills/README.md <<'EOF'
          # Claude Skill Mirror

          Shared Claude Code skills in this directory are generated from the canonical copies under `.agents/skills/`.

          The synchronization script owns these directories:

          - `aspire-local-ops`
          - `commit`
          - `seed-demo`
          - `spec-update`
          - `sprint-evidence`
          - `validate`

          Do not edit those mirrored directories directly. After changing a canonical skill, run:

          ```powershell
          pwsh scripts\agent\sync-claude-skills.ps1
          ```

          Repository validation checks the mirror with:

          ```powershell
          pwsh scripts\agent\sync-claude-skills.ps1 -Check
          ```

          Claude-specific skills may coexist in `.claude/skills/`; the synchronization script only owns the six shared directories listed above.
          EOF

          python3 - <<'PY'
          from pathlib import Path

          path = Path('AGENTS.md')
          text = path.read_text(encoding='utf-8')

          command = 'pwsh scripts\\agent\\sync-claude-skills.ps1 -Check\n'
          build = 'dotnet build CopilotAgentObservability.slnx\n'
          if command not in text:
              if build not in text:
                  raise SystemExit('AGENTS.md build command marker not found')
              text = text.replace(build, command + build, 1)

          explanation = '''The skill-mirror check verifies that shared Claude Code skills match their
          canonical `.agents/skills/` sources. Repair drift with
          `pwsh scripts\\agent\\sync-claude-skills.ps1`, review the generated diff, and
          restart validation from the first command.

          '''
          playwright = 'The Playwright install command is required because the solution test suite\n'
          if 'The skill-mirror check verifies that shared Claude Code skills' not in text:
              if playwright not in text:
                  raise SystemExit('AGENTS.md Playwright explanation marker not found')
              text = text.replace(playwright, explanation + playwright, 1)

          repository_skills = '''## Repository Skills

          - Keep repository-scoped skills under `.agents/skills/`.
          - Treat `.agents/skills/` as the canonical source for the shared `aspire-local-ops`, `commit`, `seed-demo`, `spec-update`, `sprint-evidence`, and `validate` skills. Keep `.claude/skills/` as a generated Claude Code compatibility mirror; do not edit those six mirrored directories directly.
          - After changing a shared skill, run `pwsh scripts\\agent\\sync-claude-skills.ps1`, review the generated diff, and verify it with `pwsh scripts\\agent\\sync-claude-skills.ps1 -Check`.
          - Repository skills must encode repository-specific workflows or safety boundaries. Do not vendor general .NET, MSBuild, test, coverage, or migration skill catalogs under `.codex/skills/`; install them at user scope only for the task that needs them.
          - Implicit invocation is limited to `spec-update` and `validate`. Every other `.agents/skills/*` skill must set `policy.allow_implicit_invocation: false` in `agents/openai.yaml`.
          - Keep Aspire operations in the single `aspire-local-ops` skill while the AppHost has no resources. Do not recreate router/orchestration/monitoring variants.

          '''
          subagents = '## Subagent Requests\n'
          if '## Repository Skills\n' not in text:
              if subagents not in text:
                  raise SystemExit('AGENTS.md subagent section marker not found')
              text = text.replace(subagents, repository_skills + subagents, 1)

          text = text.replace(
              'When subagents are available, use `.agents/skills/codex-subagent-dispatch/SKILL.md`.\n',
              'When subagents are available, give each worker a self-contained mission card that names the scope, governing specifications, writable paths, validation commands, and required report.\n',
          )
          path.write_text(text, encoding='utf-8')
          PY

          pwsh scripts/agent/sync-claude-skills.ps1

      - name: Verify repository skill inventory
        shell: bash
        run: |
          set -euo pipefail

          test ! -e .codex/skills
          test ! -e .agents/skills/semantic-generation
          test ! -e .agents/skills/codex-create-pr
          test ! -e .agents/skills/aspire
          test ! -e .agents/skills/aspire-orchestration
          test ! -e .agents/skills/aspire-monitoring

          mapfile -t agent_skills < <(find .agents/skills -mindepth 2 -maxdepth 2 -name SKILL.md -printf '%h\n' | sed 's#^.agents/skills/##' | sort)
          expected_agent_skills=(aspire-local-ops commit seed-demo spec-update sprint-evidence validate)
          diff -u <(printf '%s\n' "${expected_agent_skills[@]}") <(printf '%s\n' "${agent_skills[@]}")

          mapfile -t claude_skills < <(find .claude/skills -mindepth 2 -maxdepth 2 -name SKILL.md -printf '%h\n' | sed 's#^.claude/skills/##' | sort)
          expected_claude_skills=(aspire-local-ops commit seed-demo spec-update sprint-evidence validate)
          diff -u <(printf '%s\n' "${expected_claude_skills[@]}") <(printf '%s\n' "${claude_skills[@]}")

          for skill in aspire-local-ops commit seed-demo sprint-evidence; do
            grep -Fxq '  allow_implicit_invocation: false' ".agents/skills/${skill}/agents/openai.yaml"
          done

          for skill_file in .agents/skills/*/SKILL.md; do
            test "$(head -n 1 "$skill_file")" = '---'
          done

          grep -Fq '## Repository Skills' AGENTS.md
          grep -Fq 'Implicit invocation is limited to `spec-update` and `validate`.' AGENTS.md
          grep -Fq 'Treat `.agents/skills/` as the canonical source' AGENTS.md
          ! grep -Fq '.agents/skills/codex-subagent-dispatch/SKILL.md' AGENTS.md
          git diff --check

      - name: Verify generated Claude skill mirror
        shell: pwsh
        run: pwsh scripts/agent/sync-claude-skills.ps1 -Check

      - name: Build solution
        shell: pwsh
        run: dotnet build CopilotAgentObservability.slnx

      - name: Install Playwright Chromium
        shell: pwsh
        run: pwsh scripts/test/install-playwright-chromium.ps1 -WithDeps

      - name: Run solution tests
        shell: pwsh
        run: dotnet test CopilotAgentObservability.slnx

      - name: Commit remaining cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit \
            -m "Agent workflow: chore(skills): remove unused skill catalogs" \
            -m "The repository should expose only project-specific workflows and safety boundaries. Remove the broad vendored .NET/MSBuild/test catalogs and semantic-generation procedure, make infrequent operations explicit-only, and generate the Claude compatibility surface from one canonical skill source."
          git push origin HEAD:codex/remaining-skills-cleanup-20260719
